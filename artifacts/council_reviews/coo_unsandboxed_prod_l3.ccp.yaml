header:
  aur_id: "AUR-COO-UNSANDBOX-PROMO-L3-001"
  aur_type: "governance"
  change_class: "amend"
  blast_radius: "system"
  reversibility: "easy"
  uncertainty: "medium"
  touches:
    - "runtime_core"
    - "tests"
    - "governance_protocol"
  safety_critical: true
  run_type: "review"
  model_plan_v1:
    primary: "openrouter/moonshotai/kimi-k2.5"
    independent: "openrouter/z-ai/glm-5"
    seat_overrides:
      Chair: "openrouter/minimax/minimax-m2.5"
      Challenger: "openrouter/minimax/minimax-m2.5"
      Risk: "openrouter/z-ai/glm-5"
      Governance: "openrouter/z-ai/glm-5"

sections:
  objective: |
    Review the COO unsandboxed promotion package for production use at L3.
    The subject is the promotion of the COO runtime posture from shared_ingress
    sandbox policy to unsandboxed production, with governance approval required
    before any protected-path ruling is stewarded into docs/01_governance/.
  scope:
    surface: "coo_unsandboxed_promotion"
    branch: "main"
    commit: "3ca414ec"
    files:
      - "runtime/orchestration/coo/commands.py"
      - "runtime/orchestration/coo/promotion_guard.py"
      - "runtime/tools/openclaw_verify_surface.sh"
      - "runtime/orchestration/ceo_queue.py"
      - "scripts/campaign/"
      - "artifacts/coo/promotion_campaign/"
      - "config/openclaw/instance_profiles/"
      - "config/openclaw/profile_approvals/"
  constraints:
    - "No write to docs/01_governance/ before Council acceptance plus manual approval."
    - "Promotion must remain capped to autonomy levels L0, L3, and L4 only."
    - "Rollback target must remain coo_shared_ingress_burnin.json."
    - "Approval manifest must be sealed only after approved ruling ref exists."
    - "Review must treat this as a governance-facing, safety-critical runtime promotion."
  artifacts:
    - id: "runtime/orchestration/coo/commands.py"
      type: "modified"
      description: "COO capture dump support for promotion campaign."
    - id: "runtime/orchestration/coo/promotion_guard.py"
      type: "new_module"
      description: "Approval-manifest and delegation-ceiling validation."
    - id: "runtime/tools/openclaw_verify_surface.sh"
      type: "modified"
      description: "Verify-surface approval-manifest check."
    - id: "scripts/campaign/"
      type: "new_package"
      description: "Promotion campaign runners, rollback, soak, and handoff."
    - id: "artifacts/coo/promotion_campaign/"
      type: "new_artifacts"
      description: "Fixtures and manifests for the promotion campaign."
    - id: "config/openclaw/instance_profiles/coo_unsandboxed_prod_l3.json"
      type: "new_config"
      description: "Candidate unsandboxed production profile."
  design_rationale: |
    The candidate profile (coo_unsandboxed_prod_l3.json) is intentionally
    configured with target_posture=unsandboxed, allowed_modes=[all], and
    sandbox confinement not required. This is the purpose of the promotion:
    to enable production COO autonomy at L3 without session sandbox overhead.

    This trade-off is ACCEPTED and RATIFIED in:
      docs/01_governance/Council_Ruling_COO_Unsandboxed_Prod_L3_v1.0.md

    Blast radius is bounded by:
    - Delegation envelope ceiling: autonomy levels [L0, L3, L4] only
    - Approval manifest sealed with profile_sha256 + delegation_envelope_sha256
    - Deterministic rollback target: coo_shared_ingress_burnin.json
    - verify_surface.sh enforces approval_manifest check on every invocation
    - gate4_runner.py restores coo.json backup via try/finally on failure

    The run_user field is empty because the COO process identity is inherited
    from the host process, which is managed at the deployment layer (not in
    this profile). This is a known gap that is acceptable for L3 autonomy scope.

    Council lenses: treat unsandboxed posture findings against this profile as
    DESIGN-ACKNOWLEDGED risks, not unreviewed gaps. The ratified ruling above
    is the governance acceptance record.
