      - "artifacts/plans/2026-04-02-phase9-ops-autonomy-spec.md"
      - "artifacts/review_packets/Phase9_Ops_Autonomy_Review_Packet.md"
  constraints:
    - "No executor scope expansion beyond workspace.file.write, workspace.file.edit, lifeos.note.record"
    - "All actions must remain explicit_human_approval"
    - "No Phase 10 lane pre-authorized"
    - "ci and live must fail closed until approval_ref is valid"
    - "No write to docs/01_governance/ before council Accept plus CEO approval"
