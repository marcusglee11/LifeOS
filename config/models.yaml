# LifeOS Model Configuration
# Per LifeOS_Autonomous_Build_Loop_Architecture_v0.3.md §5.1.5
#
# Updated 2026-02-20: Switched to paid Claude models via Zen endpoint.
# Verified: claude-sonnet-4-5 accepted by Zen with x-api-key auth.
#
# History:
#   - 2026-02-14: kimi-k2.5-free, minimax-m2.5-free, gpt-5-nano
#   - 2026-02-19: kimi-k2.5-free, glm-5-free, minimax-m2.5-free, gpt-5-nano
#     Stage 1.5: glm-5-free best for YAML; kimi-k2.5-free best for agentic
#   - 2026-02-20: claude-sonnet-4-5 (paid, via Zen) — first full loop PASS
#
# To revert to free models, replace claude-sonnet-4-5 with opencode/glm-5-free

model_selection:
  # Default fallback chain for roles without overrides
  default_chain:
    - "claude-sonnet-4-5"
    - "opencode/glm-5-free"
    - "opencode/minimax-m2.5-free"

  # Role-specific model chains
  role_overrides:
    designer:
      - "claude-sonnet-4-5"
      - "opencode/glm-5-free"
      - "opencode/minimax-m2.5-free"

    reviewer_architect:
      - "claude-sonnet-4-5"
      - "opencode/glm-5-free"
      - "opencode/minimax-m2.5-free"

    builder:
      - "claude-sonnet-4-5"
      - "opencode/glm-5-free"
      - "opencode/minimax-m2.5-free"

    steward:
      - "claude-sonnet-4-5"
      - "opencode/glm-5-free"
      - "opencode/minimax-m2.5-free"

    build_cycle:
      - "claude-sonnet-4-5"
      - "opencode/glm-5-free"
      - "opencode/minimax-m2.5-free"

    council_reviewer:
      - "claude-sonnet-4-5"
      - "opencode/glm-5-free"
      - "opencode/minimax-m2.5-free"

    council_reviewer_security:
      - "claude-sonnet-4-5"
      - "opencode/minimax-m2.5-free"
      - "opencode/glm-5-free"


agents:
  steward:
    dispatch_mode: cli
    cli_provider: gemini
    cli_fallback: claude_code
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_STEWARD_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_STEWARD_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_STEWARD_KEY"

  builder:
    dispatch_mode: cli
    cli_provider: codex
    cli_fallback: claude_code
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_BUILDER_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_BUILDER_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_BUILDER_KEY"

  designer:
    dispatch_mode: cli
    cli_provider: claude_code
    cli_fallback: gemini
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_DESIGNER_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_DESIGNER_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_DESIGNER_KEY"

  reviewer_architect:
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_REVIEWER_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_REVIEWER_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_REVIEWER_KEY"

  build_cycle:
    dispatch_mode: cli
    cli_provider: claude_code
    cli_fallback: codex
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_BUILD_CYCLE_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_BUILD_CYCLE_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_BUILD_CYCLE_KEY"

  council_reviewer:
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_REVIEWER_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_REVIEWER_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_REVIEWER_KEY"

  council_reviewer_security:
    provider: zen
    model: "claude-sonnet-4-5"
    endpoint: "https://opencode.ai/zen/v1/messages"
    api_key_env: "ZEN_REVIEWER_KEY"
    fallback:
      - model: "opencode/glm-5-free"
        provider: "zen"
        api_key_env: "ZEN_REVIEWER_KEY"
      - model: "opencode/minimax-m2.5-free"
        provider: "zen"
        api_key_env: "ZEN_REVIEWER_KEY"

# CLI Agent Providers (heavyweight agent dispatch)
# These spawn full CLI agents with tool use, file access, and sandbox.
# Used for build missions, design reviews, security audits — tasks that
# benefit from agents that can inspect the codebase directly.
cli_providers:
  codex:
    binary: "codex"
    default_model: ""
    timeout_seconds: 600
    sandbox: false    # false = --full-auto for unattended operation
    enabled: true
  gemini:
    binary: "gemini"
    default_model: ""
    timeout_seconds: 600
    sandbox: true
    enabled: true
  claude_code:
    binary: "claude"
    default_model: ""
    timeout_seconds: 600
    sandbox: true
    enabled: true

council:
  topology: HYBRID
  provider_overrides:
    Architecture: claude_code
    Risk: gemini
    Governance: codex
    Implementation: gemini
    Strategy: claude_code
    Pragmatism: codex

# Zen configuration (Primary)
zen:
  base_url: "https://opencode.ai/zen/v1/messages"
  timeout_seconds: 300
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_multiplier: 2.0

# OpenRouter configuration (Fallback)
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  timeout_seconds: 120
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_multiplier: 2.0
