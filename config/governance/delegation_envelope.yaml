schema_version: "delegation_envelope.v1"
trust_tier: "burn-in"
description: >
  COO autonomy delegation envelope — burn-in phase (weeks 1-2).
  Default: everything not explicitly L0 goes to L3. No exceptions.

active_levels: [L0, L3, L4]

deferred_levels:
  L1:
    label: "act-then-notify"
    activation_phase: "early-trust"
    note: >
      Deferred until Weeks 3-4. Requires N successful L3 cycles
      with zero unhandled failures before activation.
  L2:
    label: "auto-execute-after-timeout"
    activation_phase: "established"
    note: "Deferred until Month 2+."

autonomy:
  L0:
    label: "full-autonomy"
    pattern: "Act, report in next status"
    actions:
      - update_tracking_state
      - record_agent_patterns
      - read_operations
      - update_artifacts_coo_brief
      - update_artifacts_coo_decisions
      - update_artifacts_coo_memory
      - auto_dispatch_eligible  # tasks passing all auto-dispatch predicates
  auto_dispatch_policy:
    requires_approval: false
    risk: low
    protected_paths: excluded
    concurrency: no scope_path overlap with in_progress tasks
    note: >
      Tasks meeting ALL predicates may be dispatched without CEO approval.
      This is a scoped L0 exception, not an activation of L1/L2.
      The full 7-predicate logic lives in runtime/orchestration/coo/auto_dispatch.py.
      Use is_fully_auto_dispatchable() as the authoritative entry point.

  L3:
    label: "propose-and-wait"
    pattern: "Propose, wait for explicit CEO approval before acting"
    actions:
      - dispatch_any_build
      - create_task
      - modify_backlog
      - reprioritize
      - sub_objective_decomposition
      - new_work_branch
      - provider_change
      - cross_tier_promotion
      - modify_objectives

  L4:
    label: "escalate"
    pattern: "Flag decision, provide 2-3 options, wait for CEO"
    actions:
      - modify_protected_paths
      - strategy_change
      - external_commitment
      - budget_above_threshold
      - ambiguous_scope
      - governance_change
      - unknown_action_category

decision_triggers:
  CT-6:
    label: decision_support_needed
    primary_gate: task.decision_support_required == true
    advisory_contexts_non_gating:
      - cross-phase transitions
      - architectural choices affecting more than two modules
    dispatch_effect: blocks auto-dispatch until the latest matching council_request.v1 is resolved, non-stale, and carries a valid approval_ref
    note: >
      CT-6 is an L0 overlay only. It applies to tasks that would otherwise
      qualify for auto-dispatch and does not replace L3 propose-and-wait.

protected_paths:
  - "docs/00_foundations/"
  - "docs/01_governance/"
  - "config/governance/protected_artefacts.json"

thresholds:
  budget_escalation_usd: 0
  budget_note: "All cost-incurring decisions require L4 escalation during burn-in"

escalation:
  queue_path: "artifacts/dispatch/ceo_queue/"
  fail_closed: true
  fail_closed_note: >
    If action category is not found in this envelope, default to L4 (escalate).
    Never guess. Fail closed is non-negotiable.
