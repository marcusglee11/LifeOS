skipped_tests:
  - test: runtime/tests/orchestration/missions/test_bypass_dogfood.py::test_plan_bypass_activation
    classification: wip
    reason: LIFEOS_TODO[P1] bypass path not yet implemented
  - test: runtime/tests/test_doc_hygiene.py::TestDocHygieneMarkdownLint::test_missing_markdownlint_dependency
    classification: wip
    reason: LIFEOS_TODO[P2] markdownlint dependency path not yet implemented
skip_reason_patterns:
  - pattern: Symlinks not supported on this platform
    classification: platform
    reason: Platform capability dependent
  - pattern: Symlinks require admin on Windows
    classification: platform
    reason: Windows privilege dependent
  - pattern: Symlinks require special permissions on Windows
    classification: platform
    reason: Windows privilege dependent
  - pattern: requires network access for pip dependencies
    classification: env_optional
    reason: Offline environment dependent
  - pattern: (?i)set RUN_LIVE_
    classification: live_only
    reason: Explicit opt-in live test
  - pattern: (?i)requires? ZEN_
    classification: live_only
    reason: Live API credential dependent
