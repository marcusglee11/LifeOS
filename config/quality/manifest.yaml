version: 1

policy:
  safe_autofix_mode: explicit_only
  notes:
    - "Auto-fix is opt-in via quality_gate.py fix."
    - "Hooks remain check-only."
    - "Markdown semantic validation remains owned by doc stewardship."

repo:
  exclude_prefixes:
    - "artifacts/"
    - "spikes/"
    - ".worktrees/"
  python_targets:
    - "runtime"
    - "doc_steward"
    - "recursive_kernel"
    - "project_builder"

tools:
  ruff_check:
    enabled: true
    mode: blocking
    scopes: ["changed", "repo"]
    autofix_allowed: true
    failure_class: ruff_error
  ruff_format:
    enabled: true
    mode: blocking
    scopes: ["changed", "repo"]
    autofix_allowed: true
    failure_class: ruff_error
  mypy:
    enabled: true
    mode: advisory
    scopes: ["changed", "repo"]
    autofix_allowed: false
    failure_class: mypy_error
  biome:
    enabled: true
    mode: blocking
    scopes: ["changed", "repo"]
    autofix_allowed: false
    failure_class: biome_error
  markdownlint:
    enabled: true
    mode: blocking
    scopes: ["changed", "repo"]
    autofix_allowed: true
    failure_class: markdownlint_error
  yamllint:
    enabled: true
    mode: advisory
    scopes: ["changed", "repo"]
    autofix_allowed: false
    failure_class: yamllint_error
  shellcheck:
    enabled: true
    mode: advisory
    scopes: ["changed", "repo"]
    autofix_allowed: false
    failure_class: shellcheck_error
  agent_control_plane_pin:
    enabled: true
    mode: blocking
    scopes: ["changed", "repo"]
    autofix_allowed: false
    failure_class: agent_control_plane_pin_error
  wmf_validator:
    enabled: true
    mode: blocking
    scopes: ["changed", "repo"]
    autofix_allowed: false
    failure_class: wmf_validation_error

waivers:
  - tool: markdownlint
    failure_class: markdownlint_error
    paths:
      - "docs/00_foundations/"
      - "docs/01_governance/"
      - "docs/10_meta/"
    reason: "Pre-existing MD013 line-length violations in architectural prose documentation. Long descriptions cannot be wrapped without restructuring content."
    expires_at: "2026-12-31T00:00:00Z"
  - tool: markdownlint
    failure_class: markdownlint_error
    paths:
      - "docs/audit/"
    reason: "External audit artifacts committed verbatim with verified SHA-256. Line length and formatting cannot be altered without breaking integrity verification."
    expires_at: "2027-12-31T00:00:00Z"
