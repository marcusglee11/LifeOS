schema_version: "order_template.v1"
template_name: "hygiene"
description: "Hygiene task — 4-phase chain with tight scope constraints"
steps:
  - name: "audit"
    role: "builder"
    provider: "auto"
    mode: "blocking"
  - name: "fix"
    role: "builder"
    provider: "auto"
    mode: "blocking"
  - name: "verify"
    role: "builder"
    provider: "auto"
    mode: "blocking"
  - name: "close"
    role: "builder"
    provider: "auto"
    mode: "blocking"
constraints:
  worktree: true
  max_duration_seconds: 1800
  governance_policy: null
shadow:
  enabled: false
  provider: "codex"
  receives: "full_task_payload"
supervision:
  per_cycle_check: false
